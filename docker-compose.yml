services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./backend/seed:/app/seed
      - ./backend/data:/app/data
    depends_on: []

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_PROXY_TARGET=http://backend:3001
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
